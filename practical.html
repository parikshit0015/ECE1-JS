<!DOCTYPE html>
<html lang="en">
<head>
  <title>Employee Management</title>
  <style>
    body {
      font-family:sans-serif;
      text-align:center;
      background-color: rgb(121, 80, 80);
    }
    .container {
      background:rgb(255, 157, 0);
        padding: 20px;
        margin:20px auto;
        width: 50%;
        box-shadow: 0 0 10px rgb(67, 116, 148);
        border-radius: 20px;
    }
    input , button {
      margin:5px;
        padding: 10px;
        width: 80%;
    }
    button {
        background-color: #4CAF50;
        color: white;
        border: none;
        cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    #output {
        margin-top: 20px;
        text-align:left;
    }
  
  </style>
</head>
<body>
    <div class="container">
        <h2>Employee Management System</h2>

        <input type="text" id="name" placeholder="Employee Name">
<input type="text" id="id" placeholder="Employee ID">
<input type="number" id="salary" placeholder="Salary">
<input type="text" id="dept" placeholder="Department">

<button onclick="addEmployee()">Add Employee</button>
<button onclick="displayEmployees()">Display All</button>
<button onclick="filterSalary()">Salary > 50000</button>
<button onclick="totalSalary()">Total Salary</button>
<button onclick="averageSalary()">Average Salary</button>
<button onclick="countDepartment()">Count by Department</button>
<div id="output"></div>
    </div>
    <script src="practical.js"></script>
</body>
</html>
